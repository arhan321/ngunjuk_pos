services:
  php_gusti:
    build: ./php
    image: php:latest
    container_name: php_gusti
    hostname: "php"
    volumes:
      - ./src:/var/www/html
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    working_dir: /var/www/html
    depends_on: 
      - db_gusti

  db_gusti:
    image: mariadb:10.2
    container_name: db_gusti
    restart: unless-stopped
    tty: true
    command: --max_allowed_packet=512M
    ports:
      - "33303:3306"
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d:ro
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: 123
      MYSQL_ROOT_PASSWORD: 123
      TZ: Asia/Jakarta
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql  
    read_only: false

  nginx_gusti:
    build: ./nginx
    image: nginx:latest
    container_name: nginx_gusti
    hostname: "nginx"
    ports:
      - "14:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php_gusti
